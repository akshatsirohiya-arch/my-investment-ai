name: Daily Market Close Scan
on:
  schedule:
    - cron: '30 20 * * 1-5' # 4:30 PM EST
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    # This block tells GitHub exactly what the runner is allowed to do
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install yfinance pandas requests
        
      - name: Run Market Scanner
        run: python scanner.py
        
      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Ensure the file exists even if no stocks are found
          touch daily_watchlist.csv
          git add daily_watchlist.csv
          # The '|| exit 0' prevents failure if there are no new changes
          git commit -m "Update Daily Watchlist [skip ci]" || exit 0
          git push
