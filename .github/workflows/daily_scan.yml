name: Daily Market Close Scan

on:
  schedule:
    # Runs Monday-Friday at 21:30 UTC (4:30 PM EST)
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # Allows you to run it manually via the "Actions" tab

env:
  # Ensures the runner uses the most modern Node environment for 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # curl_cffi is REQUIRED for yfinance to bypass 401 errors in 2026
          pip install --upgrade yfinance pandas requests curl_cffi

      - name: Run 180-Day Breakout Scanner
        # This will now use the stealth TLS fingerprinting
        run: python scanner.py

      - name: Sync and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Stage the changes
          git add daily_watchlist.csv
          
          # Handle potential sync conflicts from the web editor
          git stash
          git pull --rebase origin main
          git stash pop || echo "No local changes to merge"
          
          # Final commit and push
          git add daily_watchlist.csv
          git commit -m "Update 180-Day Breakout Watchlist [skip ci]" || exit 0
          git push origin main
