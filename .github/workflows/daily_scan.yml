name: Daily Market Close Scan
on:
  schedule:
    - cron: '30 21 * * 1-5' # Runs at 4:30 PM EST (9:30 PM UTC) Mon-Fri
  workflow_dispatch: # Allows you to press a button to run it manually

# This fix prevents the Node.js 20 deprecation failure
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install yfinance pandas requests
        
      - name: Run Market Scanner
        run: python scanner.py
        
       - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # This line adds a timestamp so the file always 'changes'
          date > last_run.txt
          git add daily_watchlist.csv last_run.txt
          # The || exit 0 prevents the 'Failure' if nothing changed
          git commit -m "Update Daily Watchlist" || exit 0
          git push
