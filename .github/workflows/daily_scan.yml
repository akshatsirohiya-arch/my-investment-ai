name: Daily Market Close Scan

on:
  schedule:
    # Runs at 4:30 PM EST (21:30 UTC) Monday-Friday
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # Manual trigger button

env:
  # Forces actions to run on Node 24 to clear deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Essential for git pull/rebase to work

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests

      - name: Run Total Market Scanner
        # This executes the math for 6,000+ tickers
        run: python scanner.py

      - name: Sync and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # FIX FOR ERROR 128:
          # 1. Stage the new CSV data
          git add daily_watchlist.csv
          
          # 2. Temporarily hide the changes so we can pull the latest code
          git stash
          
          # 3. Pull any updates from the web editor or previous runs
          git pull --rebase origin main
          
          # 4. Bring the new CSV data back
          git stash pop || echo "No changes to merge"
          
          # 5. Final commit and push
          git add daily_watchlist.csv
          git commit -m "Update Total Market Watchlist [skip ci]" || exit 0
          git push origin main
