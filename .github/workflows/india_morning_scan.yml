name: India Morning Scan

on:
  schedule:
    # 00:30 UTC is 06:00 AM India Standard Time (IST)
    - cron: '30 0 * * *'
  workflow_dispatch: # This allows you to run it manually to test it

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas yfinance curl_cffi

      - name: Run Scanner
        run: python scanner.py

      - name: Commit and Push CSV
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add daily_watchlist.csv
          # The '|| exit 0' prevents the action from failing if no changes were found
          git commit -m "6AM IST Auto-update: $(date)" || exit 0
          git push
