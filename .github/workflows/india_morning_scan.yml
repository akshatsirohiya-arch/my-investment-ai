name: Daily Stock Scan

on:
  schedule:
    # 00:30 UTC is 06:00 AM India Time (IST)
    - cron: '30 0 * * *'
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas yfinance curl_cffi

      - name: Run Scanner
        run: python scanner.py

      - name: Commit and Push CSV
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add daily_watchlist.csv
          git commit -m "Auto-update watchlist: $(date)" || exit 0
          git push
